<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>School Directory</h1>
    
    <div>
        Class: 
        <select id="class-select" onchange="initGame()">
            <option value="geography">Geography (11B1)</option>
            <option value="english">English (11B1)</option>
            <option value="maths">Maths (11B1)</option>
            <option value="science">Science (11B1)</option>
        </select>

        <input type="checkbox" id="teacher-toggle" onchange="initGame()" checked> 
        Include Teachers

        <button onclick="initGame()">Reset</button>
    </div>

    <hr>

    <div id="game-board"></div>

    <script src="script.js"></script>
</body>
</html>
